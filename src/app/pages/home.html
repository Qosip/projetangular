<div class="home-root">

    <!-- Central content -->
    <div class="home-center">

        <!-- Greeting -->
        <div class="home-header">
            <div class="home-symbol">&#9670;</div>
            <h1 class="home-title">
                Bonjour, <span class="home-username">{{ auth.username() || 'Operateur' }}</span>
            </h1>
            <p class="home-subtitle">
                Initiez une discussion de groupe avec vos agents IA.
            </p>
        </div>

        <!-- New chat CTA -->
        <button class="new-chat-cta" (click)="createChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4" />
            </svg>
            <span>Nouveau Chat</span>
        </button>

        <!-- Recent conversations -->
        @if (chats().length > 0) {
        <app-recent-conversations [chats]="chats().slice(0, 4)" />
        }

    </div>

    <!-- Bottom hint -->
    <p class="home-hint">&gt; neural gateway v1.0<span class="cursor-blink">_</span></p>

</div>
