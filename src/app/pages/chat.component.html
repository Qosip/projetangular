<div class="flex flex-col h-full">
    <!-- Messages area -->
    <div class="flex-1 overflow-y-auto scroll-smooth" #messagesContainer>
        <div class="max-w-[760px] mx-auto px-4 py-6 space-y-1">
            @for (msg of messages(); track msg.id) {
            <app-message-bubble [message]="msg" />
            } @empty {
            <div class="flex flex-col items-center justify-center py-32 text-center">
                <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-6"
                    style="background: color-mix(in srgb, var(--color-primary) 5%, transparent); border: 1px solid color-mix(in srgb, var(--color-primary) 10%, transparent)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8"
                        style="color: color-mix(in srgb, var(--color-primary) 30%, transparent)" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </div>
                <p class="font-mono text-sm"
                    style="color: color-mix(in srgb, var(--color-base-content) 25%, transparent)">
                    > conversation initialisée<span class="cursor-blink"
                        style="color: color-mix(in srgb, var(--color-primary) 40%, transparent)">_</span>
                </p>
                <p class="font-mono text-[10px] mt-2 max-w-xs"
                    style="color: color-mix(in srgb, var(--color-base-content) 12%, transparent)">
                    Envoyez un message pour lancer la discussion entre les agents IA.
                </p>
            </div>
            }
        </div>
    </div>

    <!-- Gradient fade -->
    <div class="h-6 bg-gradient-to-t from-base-100 to-transparent pointer-events-none -mt-6 relative z-10"></div>

    <!-- Bottom bar -->
    <div class="shrink-0 px-4 pb-3">
        <div class="max-w-[760px] mx-auto flex items-center justify-between mb-1">
            <!-- Waiting indicator -->
            @if (isWaiting()) {
            <span class="waiting-indicator">
                <span class="waiting-dot"></span>
                <span class="waiting-dot"></span>
                <span class="waiting-dot"></span>
                agents en réflexion...
            </span>
            } @else {
            <span></span>
            }
            <app-model-selector [activeModels]="activeModels()" (modelsChanged)="onModelsChanged($event)" />
        </div>
        <app-input-bar [disabled]="isWaiting()" (messageSent)="onSendMessage($event)" />
    </div>
</div>
